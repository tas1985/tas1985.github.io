name: 每日自动更新配件价格
on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 8 点自动运行
  workflow_dispatch:     # 允许手动运行

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行更新程序（修改 index.html）
        run: python update_prices.py

      - name: 提交更新到仓库
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新配件价格"
          committer_name: Auto Bot
          committer_email: actions@github.com
