name: 强制更新价格
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run script
        run: python update_prices.py
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "强制更新价格"
