name: 强制更新价格
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 运行价格更新脚本
        run: python update_prices.py

      - name: 提交并推送
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新价格"
