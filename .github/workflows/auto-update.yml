name: 每日自动更新价格
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 运行更新脚本
        run: python update-prices.py

      - name: 提交并推送
        uses: ad-m/github-push-action@master
        with:
          branch: main
          directory: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "自动更新价格 $(date +'%Y-%m-%d')"
