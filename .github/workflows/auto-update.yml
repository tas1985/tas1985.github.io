name: 自动更新配件价格
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests fuzzywuzzy python-Levenshtein
      - run: python update_prices.py
      - uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新 p: 价格"
