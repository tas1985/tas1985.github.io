name: 每日自动更新配件价格
on:
  # 定时触发：每天UTC 0点（北京时间8点）
  schedule:
    - cron: "0 0 * * *"
  # 支持手动触发测试
  workflow_dispatch:

# 赋予仓库写入权限（必须）
permissions:
  contents: write

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 fuzzywuzzy python-Levenshtein

      - name: 运行价格更新脚本
        run: python update_prices.py

      - name: 提交并推送修改
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新配件实时价格"
          committer_name: GitHub Actions
          committer_email: actions@github.com
