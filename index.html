    // 验证密码是否有效（3个月有效期）
    function checkPasswordValidity() {
        const passwordRecord = JSON.parse(localStorage.getItem('passwordAuth')) || {};
        const { expireTime, isValid } = passwordRecord;
        
        // 验证是否已授权且在有效期内
        if (isValid && expireTime && new Date().getTime() < expireTime) {
            return true;
        }
        return false;
    }

    // 显示密码弹窗
    function showPasswordModal() {
        document.getElementById('passwordModal').style.display = 'flex';
        // 禁用页面交互
        document.body.style.overflow = 'hidden';
        document.querySelector('.container').style.pointerEvents = 'none';
    }

    // 隐藏密码弹窗
    function hidePasswordModal() {
        document.getElementById('passwordModal').style.display = 'none';
        // 恢复页面交互

        document.querySelector('.container').style.pointerEvents = 'auto';
    }

            // 计算3个月后的时间戳（按每月30天计算，实际可根据需求调整）
            const now = new Date().getTime();
            const threeMonthsLater = now + 3 * 30 * 24 * 60 * 60 * 1000;
            
            // 保存授权信息到本地存储
            localStorage.setItem('passwordAuth', JSON.stringify({
                isValid: true,
                expireTime: threeMonthsLater,
                authTime: now
            }));

        }

    // 加载数据（合并默认数据和本地存储的自定义数据）
    function loadData() {
        const savedData = localStorage.getItem("productData");
        if (savedData) {
            try {
                const loadedData = JSON.parse(savedData);
                // 确保other类目存在
                if (!loadedData.other) {
                    loadedData.other = defaultData.other;
                }
                return loadedData;
            } catch (e) {
                console.error("加载本地数据失败，使用默认数据", e);
                return JSON.parse(JSON.stringify(defaultData));
            }
        }
        return JSON.parse(JSON.stringify(defaultData));
    }

    // 1. 点击输入框自动触发下拉列表 - 优化版：确保下拉框样式和显示正常
    function match(key){
        let val=document.getElementById(key).value.toLowerCase();
        let box=document.getElementById(key+"-drop");
        box.innerHTML="";
        // 即使输入为空，点击也显示全部列表
        let arr = val ? data[key].filter(i=>i.n.toLowerCase().includes(val)) : data[key];
        if(arr.length===0){
            box.style.display="none";
            return;
        }
        arr.forEach((i, idx)=>{
            let d=document.createElement("div");
            // 配件名称和删除按钮布局
            d.innerHTML = `
                <span>${i.n}</span>
                <span class="dropdown-delete" data-type="${key}" data-index="${idx}">×</span>
            `;
            // 左键点击选择配件
            d.addEventListener('mousedown', function(e) {
                // 阻止事件冒泡，避免触发删除按钮的点击
                if (e.target.classList.contains('dropdown-delete')) return;
                
                e.preventDefault();
                document.getElementById(key).value = i.n;
                document.getElementById(key+"-p").value = i.p;
                box.style.display = "none";
                calc();
                saveNow();
            });
            
            // 下拉列表删除按钮点击事件
            const deleteBtn = d.querySelector('.dropdown-delete');
            deleteBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡
                const type = this.getAttribute('data-type');
                const index = parseInt(this.getAttribute('data-index'));
                deleteDropdownItem(type, index);
            });

            // 右键点击显示删除菜单（保留原有功能）
            d.oncontextmenu=(e)=>{
                e.preventDefault();
                // 存储选中的配件信息
                selectedItem.type = key;
                selectedItem.index = idx;
                // 显示右键菜单
                const menu = document.getElementById('contextMenu');
                menu.style.display = 'block';
                menu.style.left = `${e.pageX}px`;
                menu.style.top = `${e.pageY}px`;
                // 隐藏下拉框
                box.style.display="none";
            };
            box.appendChild(d);
        });
        box.style.display="block";
        // 关键优化：确保下拉框能被正确显示（解决层级/显示问题）
        box.style.zIndex = 100;
        box.style.position = "absolute";
        box.style.width = document.getElementById(key).offsetWidth + "px";
    }

    // 删除下拉列表中的配件项
    function deleteDropdownItem(type, index) {
        if (confirm(`确定删除【${data[type][index].n}】吗？`)) {
            // 删除数组中的对应项
            data[type].splice(index, 1);
            // 保存数据
            saveData();
            // 重新渲染下拉列表
            match(type);
        }
    }

    // 删除选中的配件（原有右键菜单删除功能）
    function deleteSelectedItem() {
        if (selectedItem.type && selectedItem.index >= 0) {
            if (confirm(`确定删除【${data[selectedItem.type][selectedItem.index].n}】吗？`)) {
                // 删除数组中的对应项
                data[selectedItem.type].splice(selectedItem.index, 1);
                // 保存数据
                saveData();
                // 重新渲染下拉列表
                match(selectedItem.type);
                // 隐藏右键菜单
                document.getElementById('contextMenu').style.display = 'none';
                // 重置选中状态
                selectedItem = {type: '', index: -1};
            }
        }
        // 隐藏右键菜单
        document.getElementById('contextMenu').style.display = 'none';
    }

    // 点击空白处关闭右键菜单
    document.addEventListener('click', () => {
        document.getElementById('contextMenu').style.display = 'none';
        selectedItem = {type: '', index: -1};
    });

    function hideDrop(key){
        setTimeout(()=>document.getElementById(key+"-drop").style.display="none",150)
    }

    function calc(){
        let sum=0;
        // 新增other字段到计算列表
        ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k=>{
            sum+=parseFloat(document.getElementById(k+"-p").value)||0;
        });
        document.getElementById("total").innerText=sum.toFixed(2);
        // 修改：最终报价四舍五入为整数，去掉小数点
        const finalPrice = Math.round(sum / 0.934);
        document.getElementById("final").innerText=`${finalPrice} 元`;
    }

    function saveNow(){
        let o={user:document.getElementById("user").value};
        // 新增other和remark字段到保存数据
        ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k=>{
            o[k]=document.getElementById(k).value;
            o[k+"p"]=document.getElementById(k+"-p").value;
        });
        o.remark = document.getElementById("remark").value; // 修改为value获取textarea内容
        localStorage.setItem("last",JSON.stringify(o));
    }

    // 新增：更新实时日期时间
    function updateDateTime() {
        const now = new Date();
        // 格式化日期时间：YYYY-MM-DD HH:MM:SS
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        const formattedTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        document.getElementById("datetimeDisplay").textContent = formattedTime;
    }

    window.onload=()=>{
        let d=localStorage.getItem("last");
        if(d){
            d=JSON.parse(d);
            document.getElementById("user").value=d.user||"";
            ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k=>{
                document.getElementById(k).value=d[k]||"";
                document.getElementById(k+"-p").value=d[k+"p"]||"";
            });
            // 加载备注（修改为value赋值）
            if (d.remark) {
                document.getElementById("remark").value = d.remark;
            }
            calc();
        }
        // 初始化客户名称下拉列表
        initUserDropdown();
        
        // 初始化并启动实时日期时间更新
        updateDateTime();
        setInterval(updateDateTime, 1000); // 每秒更新一次
    }

    function save(){
        let u=document.getElementById("user").value.trim();
        if(!u){alert("请输入客户名称");return}
        let list=JSON.parse(localStorage.getItem("list"))||[];
        let o={name:u,time:new Date().toLocaleString()};
        // 新增other和remark字段到保存配置
        ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k=>{
            o[k]=document.getElementById(k).value;
            o[k+"p"]=document.getElementById(k+"-p").value;
        });
        o.remark = document.getElementById("remark").value; // 修改为value获取textarea内容
        list.push(o);
        localStorage.setItem("list",JSON.stringify(list));
        // 更新客户名称下拉列表
        initUserDropdown();
        alert("保存成功");
    }

    function showLoad(){
        let list=JSON.parse(localStorage.getItem("list"))||[];
        let h="";
        if(list.length===0)h="<div style='padding:10px;text-align:center;color:#000'>暂无保存</div>";
        else list.forEach((i,j)=>{
            h+=`<div class='modal-item'><div>${i.name}</div><div style='font-size:12px;color:#9900ff'>${i.time}</div><button onclick="load(${j})">加载</button></div>`;
        });
        document.getElementById("mlist").innerHTML=h;
        document.getElementById("loadModal").style.display="flex";
    }

    function load(idx){
        let list=JSON.parse(localStorage.getItem("list"))||[];
        let d=list[idx];
        document.getElementById("user").value=d.name;
        // 加载other字段
        ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k=>{
            document.getElementById(k).value=d[k]||"";
            document.getElementById(k+"-p").value=d[k+"p"]||"";
        });
        // 加载备注（修改为value赋值）
        if (d.remark) {
            document.getElementById("remark").value = d.remark;
        }
        calc();
        saveNow();
        closeModal('loadModal');
        alert("加载成功");
    }

    function closeModal(m){
        document.getElementById(m).style.display="none";
    }

    function reset(){
        if(!confirm("确定清空？"))return;
        localStorage.removeItem("last");
        location.reload();
    }

    function showUpdate(){
        document.getElementById("updateModal").style.display="flex";
    }

    // 优化更新报价功能：支持中文类目 + 英文类目
    function doUpdate(){
        let t=document.getElementById("updateText").value.trim();
        if(!t){alert("请输入更新内容");return}
        let lines=t.split("\n");
        let updateCount = 0;
        let notFoundList = [];
        
        lines.forEach(line=>{
            // 处理可能的空格问题
            let parts = line.split(",").map(part => part.trim());
            let [typeName,name,price] = parts;
            
            // 验证必要参数
            if(!typeName || !name || !price) return;
            
            // 转换中文类目为英文key
            let type = categoryMap[typeName] || typeName;
            
            // 检查品类是否存在
            if(!data[type]) {
                notFoundList.push(`品类不存在: ${typeName}`);
                return;
            }
            
            // 查找匹配的型号（精确匹配）
            let targetIndex = data[type].findIndex(item => item.n.trim() === name.trim());
            
            if(targetIndex !== -1){
                // 更新价格
                data[type][targetIndex].p = parseFloat(price);
                updateCount++;
            } else {
                notFoundList.push(`${typeName}: ${name} (型号未找到)`);
            }
        });
        
        // 更新后保存数据到本地
        saveData();
        closeModal('updateModal');
        
        // 提示更新结果
        let message = `报价更新完成！\n成功更新 ${updateCount} 条数据`;
        if(notFoundList.length > 0){
            message += `\n\n未找到的项目：\n${notFoundList.join('\n')}`;
        }
        alert(message);
        
        // 重新计算当前配置总价（如果更新的型号正在使用）
        calc();
        
        // 重新渲染所有下拉列表（更新当前显示的价格）
        ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k => {
            const inputVal = document.getElementById(k).value;
            if(inputVal) {
                const item = data[k].find(i => i.n === inputVal);
                if(item) {
                    document.getElementById(k+"-p").value = item.p;
                }
            }
        });
    }

    // 优化添加型号功能：添加到列表最前面并永久保存 + 修复添加后不显示问题
    function showAdd(){
        // 清空输入框
        document.getElementById("addType").value = "";
        document.getElementById("addName").value = "";
        document.getElementById("addPrice").value = "";
        document.getElementById("addModal").style.display = "flex";
    }

    function doAdd(){
        const type = document.getElementById("addType").value;
        const name = document.getElementById("addName").value.trim();
        const price = parseFloat(document.getElementById("addPrice").value);

        // 验证输入
        if(!type){
            alert("请选择品类！");
            return;
        }
        if(!name){
            alert("请输入型号名称！");
            return;
        }
        if(isNaN(price) || price < 0){
            alert("请输入有效的价格（非负数）！");
            return;
        }

        // 检查是否已存在相同名称的型号（精确匹配）
        const exists = data[type].some(item => item.n.trim() === name);
        if(exists){
            alert("该型号已存在！");
            return;
        }

        // 添加新型号到列表最前面
        data[type].unshift({n: name, p: price});
        
        // 保存到localStorage永久存储
        saveData();
        
        closeModal('addModal');
        
        // 核心修复：添加完成后主动触发对应品类的下拉列表渲染
        // 先清空对应输入框的内容（避免过滤影响），再触发匹配
        const typeInput = document.getElementById(type);
        const currentValue = typeInput.value;
        typeInput.value = ""; // 清空输入框确保能显示所有选项
        match(type); // 主动触发下拉列表渲染
        typeInput.value = currentValue; // 恢复输入框原有内容
        
        alert("型号添加成功！");
    }

    // 新增清空单个配件栏目的功能
    function clearItem(key) {
        document.getElementById(key).value = "";
        document.getElementById(key + "-p").value = "";
        calc(); // 重新计算总价
        saveNow(); // 保存当前状态
        // 隐藏下拉框（如果显示的话）
        document.getElementById(key + "-drop").style.display = "none";
    }

    // ========== 客户名称下拉列表功能 ==========
    // 初始化客户名称下拉列表
    function initUserDropdown() {
        const list = JSON.parse(localStorage.getItem("list")) || [];
        // 提取唯一的客户名称并去重
        const userNames = Array.from(new Set(list.map(item => item.name).filter(name => name.trim())));
        const dropdown = document.getElementById("userDropdown");
        dropdown.innerHTML = "";
        
        userNames.forEach(name => {
            const div = document.createElement("div");
            div.innerText = name;
            div.onmousedown = () => {
                document.getElementById("user").value = name;
                dropdown.style.display = "none";
                // 自动加载对应的配置单
                loadConfigByName(name);
            };
            dropdown.appendChild(div);
        });
    }

    // 根据客户名称加载对应的配置单
    function loadConfigByName(name) {
        const list = JSON.parse(localStorage.getItem("list")) || [];
        // 查找最新的同名配置（也可以改为查找第一个）
        const config = list.find(item => item.name === name);
        
        if(config) {
            document.getElementById("user").value = config.name;
            ["cpu","ram","board","cooler","vga","ssd","hdd","case","fan","power","other"].forEach(k=>{
                document.getElementById(k).value = config[k] || "";
                document.getElementById(k+"-p").value = config[k+"p"] || "";
            });
            // 加载备注（修改为value赋值）
            if (config.remark) {
                document.getElementById("remark").value = config.remark;
            }
            calc();
            saveNow();
            alert(`成功加载【${name}】的配置单`);
        } else {
            alert(`未找到【${name}】的配置单`);
        }
    }

    // 显示客户名称下拉列表
    function showUserDropdown() {
        const dropdown = document.getElementById("userDropdown");
        // 如果有选项才显示
        if (dropdown.children.length > 0) {
            dropdown.style.display = "block";
            // 过滤匹配当前输入的内容
            filterUserDropdown();
        }
    }

    // 过滤客户名称下拉列表
    function filterUserDropdown() {
        const inputVal = document.getElementById("user").value.toLowerCase();
        const dropdown = document.getElementById("userDropdown");
        const items = dropdown.getElementsByTagName("div");
        
        Array.from(items).forEach(item => {
            if (item.innerText.toLowerCase().includes(inputVal)) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    }

    // 隐藏客户名称下拉列表
    function hideUserDropdown() {
        setTimeout(() => {
            document.getElementById("userDropdown").style.display = "none";
        }, 150);
    }
</script>
