    // 初始化日期时间显示
    function initDatetime() {
        const now = new Date();
        const formatTime = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            const second = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
        };
        document.getElementById('datetimeDisplay').textContent = formatTime(now);
        setInterval(() => {
            document.getElementById('datetimeDisplay').textContent = formatTime(new Date());
        }, 1000);
    }

    function match(type) {
        hideAllDrop();
        const input = document.getElementById(type);
        const drop = document.getElementById(type + '-drop');
        drop.style.display = 'block';
        const val = input.value.toLowerCase();
        const data = db[type] || [];
        
        // 筛选匹配项
        const filtered = data.filter(item => item.n.toLowerCase().includes(val));
        
        // 渲染下拉项（新增价格展示）
        drop.innerHTML = filtered.map(item => `
            <div onclick="selectItem('${type}', '${item.n}', ${item.p})">
                <span>${item.n}</span>
                <span style="display:flex;align-items:center;gap:8px">
                    <span class="dropdown-price-tag">¥${item.p.toFixed(2)}</span>
                    <span class="dropdown-delete" onclick="event.stopPropagation();deleteItem('${type}', '${item.n}')">×</span>
                </span>
            </div>
        `).join('');
    }

    // 隐藏所有下拉菜单
    function hideAllDrop() {
        const drops = document.querySelectorAll('.dropdown, .user-dropdown');
        drops.forEach(drop => drop.style.display = 'none');
    }

    // 隐藏指定下拉菜单
    function hideDrop(type) {
        setTimeout(() => {
            document.getElementById(type + '-drop').style.display = 'none';
        }, 200);
    }

    // 隐藏客户名称下拉
    function hideUserDropdown() {
        setTimeout(() => {
            document.getElementById('userDropdown').style.display = 'none';
        }, 200);
    }

    // 选择配件项
    function selectItem(type, name, price) {
        document.getElementById(type).value = name;
        document.getElementById(type + '-p').value = price.toFixed(2);
        hideDrop(type);
        calc();
    }

    // 清空配件项
    function clearItem(type) {
        document.getElementById(type).value = '';
        document.getElementById(type + '-p').value = '';
        calc();
    }

    // 删除配件项
    function deleteItem(type, name) {
        db[type] = db[type].filter(item => item.n !== name);
        match(type); // 重新渲染下拉菜单
    }

    // 显示客户名称下拉
    function showUserDropdown() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.style.display = 'block';
        const savedConfigs = JSON.parse(localStorage.getItem('savedConfigs')) || [];
        
        dropdown.innerHTML = savedConfigs.map(config => `
            <div onclick="selectUser('${config.user}')">
                <span>${config.user}</span>
                <span class="user-price-tag">总价：¥${(config.final || 0).toFixed(2)}</span>
            </div>
        `).join('');
    }

    // 筛选客户名称下拉
    function filterUserDropdown() {
        const inputVal = document.getElementById('user').value.toLowerCase();
        const dropdown = document.getElementById('userDropdown');
        const savedConfigs = JSON.parse(localStorage.getItem('savedConfigs')) || [];
        const filtered = savedConfigs.filter(config => config.user.toLowerCase().includes(inputVal));
        
        dropdown.innerHTML = filtered.map(config => `
            <div onclick="selectUser('${config.user}')">
                <span>${config.user}</span>
                <span class="user-price-tag">总价：¥${(config.final || 0).toFixed(2)}</span>
            </div>
        `).join('');
    }

    // 选择客户名称
    function selectUser(username) {
        document.getElementById('user').value = username;
        hideUserDropdown();
        // 加载对应配置（需结合原有加载逻辑）
    }

    // 计算总价
    function calc() {
        const items = ['cpu', 'ram', 'board', 'cooler', 'vga', 'ssd', 'hdd', 'case', 'fan', 'power'];
        let total = 0;
        items.forEach(item => {
            const price = parseFloat(document.getElementById(item + '-p').value) || 0;
            total += price;
        });
        document.querySelector('.total-final').textContent = `最终报价：¥${total.toFixed(2)}`;
        // 同步更新其他总价显示（如有）
    }

    // 密码验证函数（示例）
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        // 此处替换为实际密码验证逻辑
        if (input === '58508218') {
            document.getElementById('passwordModal').style.display = 'none';
            localStorage.setItem('auth', 'true');
            localStorage.setItem('authTime', new Date().getTime().toString());
        } else {
            alert('密钥错误，请联系作者获取正确密钥！');
        }
    }

    // 页面初始化
    window.onload = function() {
        initDatetime();
        // 密码验证逻辑（示例）
        const auth = localStorage.getItem('auth');
        const authTime = parseInt(localStorage.getItem('authTime') || 0);
        const now = new Date().getTime();
        const threeMonths = 3 * 30 * 24 * 60 * 60 * 1000;
        if (!auth || (now - authTime) > threeMonths) {
            document.getElementById('passwordModal').style.display = 'flex';
        }
        calc();
    };
</script>
</body>
